name: Provider Modules

on:
  push:
    branches: [ main ]
    paths:
      - 'providers/**'
      - '*.go'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    branches: [ main ]
    paths:
      - 'providers/**'
      - '*.go'
      - 'go.mod'
      - 'go.sum'

jobs:
  test:
    name: Test ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [otelmail, mailgun, sendgrid, ses]
        go-version: ['1.26']

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}

    - name: Download dependencies
      working-directory: providers/${{ matrix.module }}
      run: go mod download

    - name: Run go vet
      working-directory: providers/${{ matrix.module }}
      run: go vet ./...

    - name: Run tests
      working-directory: providers/${{ matrix.module }}
      run: go test -v -race ./...
